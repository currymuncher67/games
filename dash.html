<!DOCTYPE html>
<html>
<head>
<title>Dash World</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}
button{
padding:20px;
font-size:20px;
margin:20px;
background:#111;
color:#0ff;
border:2px solid #0ff;
cursor:pointer;
}
#menu, #characterMenu, #levelMenu, #game{
display:none;
}
canvas{
background:#000;
display:block;
margin:auto;
}
</style>
</head>

<body>

<h1>DASH WORLD</h1>

<div id="menu">
<button onclick="openLevels()">PLAY</button><br>
<button onclick="openCharacters()">CHARACTERS</button>
</div>

<div id="characterMenu">
<h2>Select Character</h2>
<div id="chars"></div>
<button onclick="back()">Back</button>
</div>

<div id="levelMenu">
<h2>Select Level</h2>
<div id="levels"></div>
<button onclick="back()">Back</button>
</div>

<div id="game">
<canvas id="canvas"></canvas>
</div>

<script>

let unlockedChars=[0];
let unlockedLevels=[0];

let currentChar=0;
let currentLevel=0;

const charsDiv=document.getElementById("chars");
const levelsDiv=document.getElementById("levels");

function showMenu(){
hideAll();
document.getElementById("menu").style.display="block";
}

function openCharacters(){
hideAll();
document.getElementById("characterMenu").style.display="block";
renderChars();
}

function openLevels(){
hideAll();
document.getElementById("levelMenu").style.display="block";
renderLevels();
}

function hideAll(){
document.getElementById("menu").style.display="none";
document.getElementById("characterMenu").style.display="none";
document.getElementById("levelMenu").style.display="none";
document.getElementById("game").style.display="none";
}

function back(){
showMenu();
}

function renderChars(){
charsDiv.innerHTML="";
for(let i=0;i<8;i++){
let b=document.createElement("button");
b.innerText=unlockedChars.includes(i)?"Cube "+(i+1):"Locked";
b.onclick=()=>{ if(unlockedChars.includes(i)){currentChar=i;} }
charsDiv.appendChild(b);
}
}

function renderLevels(){
levelsDiv.innerHTML="";
for(let i=0;i<12;i++){
let b=document.createElement("button");
b.innerText=unlockedLevels.includes(i)?"Level "+(i+1):"Locked";
b.onclick=()=>{ if(unlockedLevels.includes(i)){ startLevel(i);} }
levelsDiv.appendChild(b);
}
}

function startLevel(lvl){
hideAll();
document.getElementById("game").style.display="block";
runGame(lvl);
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=900;
canvas.height=400;

function runGame(level){

let player={x:100,y:300,size:30,dy:0};
let gravity=0.8;
let speed=5+level;
let obstacles=[];
let colorHue=0;

function jump(){
if(player.y>=300){
player.dy=-15;
}
}

document.onclick=jump;
document.onkeydown=jump;

function loop(){

player.dy+=gravity;
player.y+=player.dy;

if(player.y>=300){
player.y=300;
player.dy=0;
}

if(Math.random()<0.02+level*0.005){
obstacles.push({x:900,h:40+Math.random()*80});
}

for(let o of obstacles){
o.x-=speed;
}

for(let o of obstacles){
let oy=360-o.h;
if(player.x<o.x+30 && player.x+30>o.x && player.y<oy+o.h && player.y+30>oy){
return showMenu();
}
}

colorHue+=2;
ctx.fillStyle="hsl("+colorHue+",100%,10%)";
ctx.fillRect(0,0,900,400);

ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,30,30);

ctx.fillStyle="magenta";
for(let o of obstacles){
let oy=360-o.h;
ctx.beginPath();
ctx.moveTo(o.x,oy+o.h);
ctx.lineTo(o.x+15,oy);
ctx.lineTo(o.x+30,oy+o.h);
ctx.fill();
}

requestAnimationFrame(loop);
}

loop();

}

showMenu();

</script>

</body>
</html>
