<!DOCTYPE html>
<html>
<head>
<title>Dash Game</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
    margin:auto;
    background:#111;
}
#score{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:#0ff;
    font-family:Arial;
    font-size:22px;
}
</style>
</head>

<body>

<div id="score">0</div>
<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

let score = 0;
let speed = 6;
let gameOver = false;

const player = {
    x:120,
    y:300,
    size:30,
    dy:0,
    gravity:0.8,
    jump:-14,
    grounded:true
};

let obstacles = [];
let spawnTimer = 0;

document.addEventListener("keydown", jump);
document.addEventListener("mousedown", jump);
document.addEventListener("touchstart", jump);

function jump(){
    if(player.grounded && !gameOver){
        player.dy = player.jump;
        player.grounded = false;
    }
}

function restart(){
    obstacles = [];
    score = 0;
    speed = 6;
    gameOver = false;
    player.y = 300;
    player.dy = 0;
}

function update(){

    if(gameOver) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if(player.y >= 300){
        player.y = 300;
        player.dy = 0;
        player.grounded = true;
    }

    spawnTimer++;

    if(spawnTimer > 90){
        obstacles.push({
            x:canvas.width,
            w:30,
            h:40 + Math.random()*60
        });
        spawnTimer = 0;
    }

    for(let i=0;i<obstacles.length;i++){

        let o = obstacles[i];
        o.x -= speed;

        let oy = 360 - o.h;

        if(
            player.x < o.x + o.w &&
            player.x + player.size > o.x &&
            player.y < oy + o.h &&
            player.y + player.size > oy
        ){
            gameOver = true;
        }

        if(o.x < -50){
            obstacles.splice(i,1);
            i--;
        }
    }

    score++;

    if(score % 500 === 0){
        speed += 0.5;
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ground
    ctx.fillStyle="#222";
    ctx.fillRect(0,330,canvas.width,70);

    // Player
    ctx.shadowBlur=15;
    ctx.shadowColor="#0ff";
    ctx.fillStyle="#0ff";
    ctx.fillRect(player.x,player.y,player.size,player.size);
    ctx.shadowBlur=0;

    // Spikes
    ctx.fillStyle="#f0f";

    for(let o of obstacles){
        let oy = 360 - o.h;

        ctx.beginPath();
        ctx.moveTo(o.x,oy+o.h);
        ctx.lineTo(o.x+o.w/2,oy);
        ctx.lineTo(o.x+o.w,oy+o.h);
        ctx.fill();
    }

    document.getElementById("score").innerText = score;

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("Game Over",330,180);
        ctx.font="18px Arial";
        ctx.fillText("Click or Press Key to Restart",310,220);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener("click",()=>{
    if(gameOver) restart();
});

document.addEventListener("keydown",()=>{
    if(gameOver) restart();
});

loop();

</script>

</body>
</html>
